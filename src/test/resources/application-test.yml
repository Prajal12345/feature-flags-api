spring:
  datasource:
    url: jdbc:h2:mem:featureflags;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: false

featureflags:
  cache:
    ttl-seconds: 60
    max-size: 100
