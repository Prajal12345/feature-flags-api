spring:
  application:
    name: feature-flags-api
  datasource:
    url: jdbc:h2:file:./data/featureflags;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

featureflags:
  cache:
    ttl-seconds: 300
    max-size: 1000

logging:
  level:
    com.featureflags: INFO
