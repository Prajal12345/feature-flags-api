name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: feature-flags-api:latest

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn -B verify

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "${{ env.IMAGE_NAME }}" .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts

      - name: Transfer image to Droplet
        run: |
          docker save "${{ env.IMAGE_NAME }}" | gzip | \
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            'gunzip | docker load'

      - name: Run container on Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 5m
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE_NAME }}"

            docker stop feature-flags-api 2>/dev/null || true
            docker rm feature-flags-api 2>/dev/null || true

            docker run -d \
              --name feature-flags-api \
              --restart unless-stopped \
              -p 80:8080 \
              -v featureflags-data:/app/data \
              -e SERVER_PORT=8080 \
              -e SPRING_DATASOURCE_URL='jdbc:h2:file:/app/data/featureflags;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE' \
              -e SPRING_H2_CONSOLE_ENABLED=false \
              "${IMAGE}"

            docker image prune -f

            echo "Deployed ${IMAGE}"
            curl -sf http://localhost/api/v1/flags >/dev/null && echo "Health check passed"
