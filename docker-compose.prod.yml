services:
  api:
    image: ${IMAGE:-feature-flags-api:latest}
    container_name: feature-flags-api
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - featureflags-data:/app/data
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/featureflags;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_H2_CONSOLE_ENABLED: "false"

volumes:
  featureflags-data:
